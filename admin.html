<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Signed Attendance Report</title>
    <link rel="stylesheet" href="./styles.css" />
    <link rel="stylesheet" href="./admin.css" />
  </head>
  <body>
    <main class="admin-shell">
      <section class="admin-panel">
        <header class="admin-header">
          <div>
            <p class="eyebrow">Admin</p>
            <h1>Signed Attendance Report</h1>
          </div>
          <time class="clock" id="clock" aria-live="polite">--:--:--</time>
        </header>

        <form class="report-login no-print" id="reportForm">
          <label class="field">
            <span>Report PIN</span>
            <input id="reportPin" type="password" inputmode="numeric" autocomplete="current-password" required />
          </label>
          <button class="primary-button" type="submit">Open Report</button>
        </form>

        <div class="report-actions no-print" id="reportActions" hidden>
          <button class="primary-button" id="downloadHtml" type="button">Download HTML</button>
          <button class="secondary-button" id="printReport" type="button">Print / PDF</button>
        </div>

        <p class="status" id="status" role="status" aria-live="polite"></p>

        <section class="report-area" id="reportArea" hidden>
          <div class="report-title">
            <h2>Attendance Records</h2>
            <p id="reportMeta"></p>
          </div>

          <div class="table-wrap">
            <table>
              <thead>
                <tr>
                  <th>Date</th>
                  <th>Time</th>
                  <th>Staff Member</th>
                  <th>Action</th>
                  <th>Signature</th>
                </tr>
              </thead>
              <tbody id="reportRows"></tbody>
            </table>
          </div>
        </section>
      </section>
    </main>

    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <script src="./config.js"></script>
    <script src="./admin.js"></script>
  </body>
</html>
