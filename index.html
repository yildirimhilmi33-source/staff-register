<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Evim Preschool Beyerspark Staff Register</title>
    <link rel="stylesheet" href="./styles.css" />
  </head>
  <body>
    <main class="app-shell">
      <section class="panel" aria-labelledby="app-title">
        <header class="topbar brand-topbar">
          <div class="brand-lockup">
            <img class="brand-logo" src="./evim-logo.png" alt="Evim Preschool logo" />
            <div>
              <p class="eyebrow">Evim Preschool Beyerspark</p>
              <h1 id="app-title">Staff Register</h1>
            </div>
          </div>
          <time class="clock" id="clock" aria-live="polite">--:--:--</time>
        </header>

        <form class="attendance-form" id="attendanceForm">
          <div class="access-notice" id="accessNotice">Checking staff link...</div>

          <div class="staff-card" id="staffCard" hidden>
            <span>Staff member</span>
            <strong id="staffName">-</strong>
          </div>

          <div class="signature-block">
            <div class="signature-head">
              <span>Signature</span>
              <button class="ghost-button" id="clearSignature" type="button">Clear</button>
            </div>
            <canvas id="signatureCanvas" aria-label="Signature area"></canvas>
          </div>

          <div class="actions" aria-label="Check in and check out actions">
            <button class="primary-button" type="submit" data-action="Check In" disabled>Check In</button>
            <button class="secondary-button" type="submit" data-action="Check Out" disabled>Check Out</button>
          </div>
        </form>

        <p class="status" id="status" role="status" aria-live="polite"></p>
      </section>
    </main>

    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <script src="./config.js"></script>
    <script src="./app.js"></script>
  </body>
</html>
